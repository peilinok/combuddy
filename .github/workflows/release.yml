name: Release to PyPI

# Publishing a GitHub Release (with a tag like v0.1.0) builds the frontend,
# builds the wheel + sdist, and publishes to PyPI via Trusted Publishing (OIDC,
# no API token). One-time PyPI setup is in RELEASING.md.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check release tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "release tag=$TAG  pyproject version=$VER"
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Release tag ($TAG) != pyproject version ($VER). Bump the version and re-tag."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (fresh bundle into combuddy/web)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify the wheel bundles the frontend
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          assert any(n.endswith("combuddy/web/index.html") for n in names), "frontend missing from wheel!"
          print("ok:", whl, "bundles the frontend")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
