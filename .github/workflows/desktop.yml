name: Desktop builds

on:
  release:
    types: [published]

permissions:
  contents: write        # upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # arm64, pinned (not macos-latest — it migrates)
            asset: combuddy-macos-arm64.dmg
          - os: windows-2022
            asset: combuddy-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Check release tag matches pyproject version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          test "$TAG" = "$VER" || { echo "::error::tag $TAG != version $VER"; exit 1; }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Install
        run: pip install ".[desktop]" pyinstaller
      - name: PyInstaller
        working-directory: packaging
        run: pyinstaller combuddy.spec --noconfirm
      - name: Package macOS dmg (ad-hoc signed)
        if: runner.os == 'macOS'
        working-directory: packaging
        run: |
          codesign --force --deep -s - dist/combuddy.app
          # notarize only when signing secrets are present; otherwise ad-hoc + skip
          if [ -n "${{ secrets.MACOS_CERT_P12 }}" ]; then echo "notarize path (secrets present) — see RELEASING.md"; fi
          hdiutil create -volname combuddy -srcfolder dist/combuddy.app -ov -format UDZO dist/combuddy-macos-arm64.dmg
      - name: Rename Windows exe
        if: runner.os == 'Windows'
        shell: bash
        working-directory: packaging
        run: mv dist/combuddy.exe dist/combuddy-windows-x64.exe
      - name: Upload asset
        shell: bash
        working-directory: packaging
        run: gh release upload "$GITHUB_REF_NAME" "dist/${{ matrix.asset }}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
