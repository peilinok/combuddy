name: Desktop builds

'on':
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build. Leave blank to use the selected ref."
        required: false
        type: string
      release_tag:
        description: "Optional existing GitHub Release tag to upload assets to, e.g. v0.3.0."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            suffix: macos-arm64.dmg
          - os: windows-2022
            suffix: windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Resolve build ref
        id: build-ref
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          DEFAULT_REF: ${{ github.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
          elif [ -n "$RELEASE_TAG" ]; then
            echo "ref=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$DEFAULT_REF" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.build-ref.outputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve asset name
        id: asset
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"
          else
            VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          fi
          echo "name=combuddy-$VERSION-${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Install
        run: pip install ".[desktop]" pyinstaller

      - name: PyInstaller
        working-directory: packaging
        run: pyinstaller combuddy.spec --noconfirm

      - name: Package macOS dmg (ad-hoc signed)
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
        run: |
          codesign --force --deep -s - packaging/dist/combuddy.app
          # TODO: notarization is a placeholder only; no notarytool/staple runs here.
          # TODO: wire real Developer ID signing and notarization in a later task.
          if [ -n "$MACOS_CERT_P12" ]; then echo "MACOS_CERT_P12 is present; notarization placeholder only."; fi
          bash packaging/macos_dmg.sh packaging/dist/combuddy.app "packaging/dist/${{ steps.asset.outputs.name }}"

      - name: Rename Windows exe
        if: runner.os == 'Windows'
        shell: bash
        working-directory: packaging
        run: mv dist/combuddy.exe "dist/${{ steps.asset.outputs.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.name }}
          path: packaging/dist/${{ steps.asset.outputs.name }}
          retention-days: 14

      - name: Upload release asset
        if: ${{ inputs.release_tag != '' }}
        shell: bash
        working-directory: packaging
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ inputs.release_tag }}" "dist/${{ steps.asset.outputs.name }}" --clobber
